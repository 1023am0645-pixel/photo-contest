<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 강사 찍사 대회 | 김하연 대리</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Gowun Dodum', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #e8d5f5 40%, #d4e8f5 100%);
            display: flex;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 3rem 0;
        }

        /* Floating blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite alternate;
            z-index: 0;
        }
        .blob-1 { width: 400px; height: 400px; background: #f9a8d4; top: -100px; left: -100px; }
        .blob-2 { width: 300px; height: 300px; background: #c4b5fd; bottom: -80px; right: -80px; animation-delay: -4s; }
        .blob-3 { width: 250px; height: 250px; background: #bae6fd; bottom: 100px; left: 50%; animation-delay: -2s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            margin: auto;
        }

        .header {
            margin-bottom: 3rem;
        }

        .emoji-big {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        h1 {
            font-family: 'Jua', sans-serif;
            font-size: 2.8rem;
            color: #be185d;
            text-shadow: 0 2px 8px rgba(190,24,93,0.15);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #9333ea;
            opacity: 0.85;
            margin-bottom: 0.3rem;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.8);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #7c3aed;
            margin-top: 0.5rem;
        }

        .cards {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 2.5rem 2rem;
            width: 280px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }

        .card-emoji {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .card-title {
            font-family: 'Jua', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 0.6rem;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 1.2rem;
        }

        .card-btn {
            display: inline-block;
            margin-top: auto;
            padding: 0.6rem 1.5rem;
            border-radius: 20px;
            font-family: 'Jua', sans-serif;
            font-size: 0.95rem;
            transition: transform 0.2s;
        }
        .card-btn:hover { transform: scale(1.05); }

        /* User card */
        .card-user .card-title { color: #be185d; }
        .card-user .card-btn {
            background: linear-gradient(135deg, #f9a8d4, #f472b6);
            color: white;
            box-shadow: 0 4px 15px rgba(244,114,182,0.4);
        }

        /* Admin card */
        .card-admin .card-title { color: #6d28d9; }
        .card-admin .card-btn {
            background: linear-gradient(135deg, #c4b5fd, #8b5cf6);
            color: white;
            box-shadow: 0 4px 15px rgba(139,92,246,0.4);
        }

        .card-img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            margin-bottom: 0.5rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
            animation: float-img 3s ease-in-out infinite alternate;
        }

        @keyframes float-img {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: rgba(100,50,100,0.5);
        }

        /* Admin password modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            width: 320px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: pop 0.3s ease;
        }
        @keyframes pop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal h3 {
            font-family: 'Jua', sans-serif;
            color: #6d28d9;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        .modal p { color: #888; font-size: 0.9rem; margin-bottom: 1.2rem; }
        .modal input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e9d5ff;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Gowun Dodum', sans-serif;
            outline: none;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        .modal input:focus { border-color: #8b5cf6; }
        .modal-btns { display: flex; gap: 0.6rem; }
        .modal-btn {
            flex: 1;
            padding: 0.7rem;
            border: none;
            border-radius: 12px;
            font-family: 'Jua', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .modal-btn:hover { transform: scale(1.03); }
        .modal-btn-confirm { background: linear-gradient(135deg, #c4b5fd, #8b5cf6); color: white; }
        .modal-btn-cancel { background: #f3f4f6; color: #666; }
        .modal-error { color: #ef4444; font-size: 0.85rem; margin-top: -0.5rem; margin-bottom: 0.8rem; display: none; }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <div class="header">
            <span class="emoji-big">📸</span>
            <h1>강사 찍사 대회</h1>
            <p class="subtitle">'25년 하반기 신입직원 입문교육</p>
            <span class="badge">김하연 대리 강의 현장 포착 이벤트 🎁</span>
        </div>

        <div class="cards">
            <!-- 참여자용 -->
            <a href="http://54.116.99.115/HAYEON/photo_event/index.php" target="_blank" class="card card-user">
                <img src="image1.png" class="card-img" alt="사진 업로드 캐릭터">
                <div class="card-title">사진 업로드</div>
                <p class="card-desc">
                    강의하는 모습을 포착해주세요!<br>
                    베스트 샷을 보내주신 분들께<br>
                    선물을 드립니다 🎁
                </p>
                <span class="card-btn">📤 참여하기</span>
            </a>

            <!-- 강사용 -->
            <div class="card card-admin" onclick="openAdminModal()">
                <img src="image2.png" class="card-img" alt="사진 확인 캐릭터">
                <div class="card-title">사진 확인</div>
                <p class="card-desc">
                    제출된 강의 사진을 확인하고<br>
                    베스트 샷을 선정해 주세요!
                </p>
                <span class="card-btn">🔐 강사용</span>
            </div>
        </div>

        <div class="footer">
            2025 신입직원 입문교육 이벤트
        </div>
    </div>

    <!-- Admin Password Modal -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal">
            <h3>🔐 관리자 인증</h3>
            <p>관리자 비밀번호를 입력해 주세요</p>
            <input type="password" id="adminPw" placeholder="••••••" onkeydown="if(event.key==='Enter') checkAdmin()">
            <p class="modal-error" id="adminError">⚠️ 비밀번호가 틀렸습니다</p>
            <div class="modal-btns">
                <button class="modal-btn modal-btn-cancel" onclick="closeAdminModal()">취소</button>
                <button class="modal-btn modal-btn-confirm" onclick="checkAdmin()">입장하기</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = '1234'; // 필요 시 변경하세요

        function openAdminModal() {
            document.getElementById('adminModal').classList.add('open');
            setTimeout(() => document.getElementById('adminPw').focus(), 100);
        }

        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('open');
            document.getElementById('adminPw').value = '';
            document.getElementById('adminError').style.display = 'none';
        }

        function checkAdmin() {
            const pw = document.getElementById('adminPw').value;
            if (pw === ADMIN_PASSWORD) {
                window.open('http://54.116.99.115/HAYEON/photo_event/admin.php', '_blank');
                closeAdminModal();
            } else {
                document.getElementById('adminError').style.display = 'block';
                document.getElementById('adminPw').value = '';
                document.getElementById('adminPw').focus();
            }
        }

        // Close modal on overlay click
        document.getElementById('adminModal').addEventListener('click', function(e) {
            if (e.target === this) closeAdminModal();
        });
    </script>
</body>
</html>
